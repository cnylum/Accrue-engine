syntax = "proto3";

package adapter.v1;

option go_package = "github.com/cnylum/accrue-engine/gen/go/adapter/v1;adapterv1";

import "common/v1/types.proto";

service AdapterService {
  rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc GetQuote(GetQuoteRequest) returns (GetQuoteResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
}

message PlaceOrderRequest {
  string account_id = 1;
  string symbol = 2;
  common.v1.OrderSide side = 3;
  common.v1.OrderType order_type = 4;
  string quantity = 5;
  string limit_price = 6; // only for limit orders
}

message PlaceOrderResponse {
  string order_id = 1;
  string status = 2;
}

message CancelOrderRequest {
  string account_id = 1;
  string order_id = 2;
}

message CancelOrderResponse {
  bool cancelled = 1;
}

message GetQuoteRequest {
  string symbol = 1;
}

message GetQuoteResponse {
  string symbol = 1;
  string bid = 2;
  string ask = 3;
  string last = 4;
}

message GetOrderRequest {
  string account_id = 1;
  string order_id = 2;
}

message GetOrderResponse {
  string order_id = 1;
  string symbol = 2;
  common.v1.OrderSide side = 3;
  common.v1.OrderType order_type = 4;
  string quantity = 5;
  string filled_quantity = 6;
  string status = 7;
}
