syntax = "proto3";

package common.v1;

option go_package = "github.com/cnylum/accrue-engine/gen/go/common/v1;commonv1";

// Money represents an amount in a specific currency using string to avoid
// floating-point precision issues. Use minor units (cents) or decimal strings.
message Money {
  string amount = 1;
  string currency = 2;
}

// AssetType enumerates supported asset classes.
enum AssetType {
  ASSET_TYPE_UNSPECIFIED = 0;
  ASSET_TYPE_STOCK = 1;
  ASSET_TYPE_CRYPTO = 2;
  ASSET_TYPE_ETF = 3;
  ASSET_TYPE_OPTION = 4;
}

// OrderSide represents buy or sell.
enum OrderSide {
  ORDER_SIDE_UNSPECIFIED = 0;
  ORDER_SIDE_BUY = 1;
  ORDER_SIDE_SELL = 2;
}

// OrderType enumerates order types.
enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_MARKET = 1;
  ORDER_TYPE_LIMIT = 2;
}
